<style>


/* ============================================================
   PRP Automation Dashboard — visual system v4
   Palette : true black + gold ring glass (green/red = status only)
   Radius  : panels 20-24 · rows 14 · pills 999  (locked)
   Type    : Arial throughout (UI, data, display)
   ============================================================ */
:root {
  --bg:        #000000;
  /* brand gold */
  --gold:      #EDC94F;
  --gold-hi:   #F2D465;
  --gold-mid:  #E5BD3D;
  --gold-deep: #B58D20;
  --gold-ink:  #241C05;
  /* text */
  --tx-hi:     #FFFFFF;
  --tx-body:   rgba(255,255,255,0.78);
  --tx-mute:   rgba(255,255,255,0.55);
  --tx-faint:  rgba(255,255,255,0.42);
  --cream-dim:   rgba(255,240,200,0.52);
  --cream-faint: rgba(255,240,200,0.38);
  /* semantic status */
  --green:      #6FBF5A;
  --green-soft: #8EC877;
  --red:        #E06A6A;
  /* surfaces + hairlines */
  --glass:    rgba(255,255,255,0.012);
  --glass-2:  rgba(255,255,255,0.04);
  --hairline: rgba(255,255,255,0.07);
  --hairline-2: rgba(255,255,255,0.045);
  /* type */
  --font:  Arial, 'Helvetica Neue', Helvetica, sans-serif;
  --mono:  Arial, 'Helvetica Neue', Helvetica, sans-serif;
  --serif: Arial, 'Helvetica Neue', Helvetica, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; -webkit-text-size-adjust: 100%; }
body {
  min-height: 100%;
  background: #000000;
  color: var(--tx-body);
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.55;
  letter-spacing: -0.005em;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
body > * { position: relative; z-index: 1; }
:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; border-radius: 4px; }
::selection { background: rgba(237,201,79,0.35); color: #fff; }
* { scrollbar-width: thin; scrollbar-color: rgba(237,201,79,0.22) transparent; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(237,201,79,0.18); border-radius: 999px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: rgba(237,201,79,0.35); }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .001ms !important; animation-iteration-count: 1 !important;
    transition-duration: .001ms !important; scroll-behavior: auto !important;
  }
}

/* ── AMBIENT GOLD AURORA ── */
.bg-fx { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.bg-aurora {
  position: absolute; inset: -25%;
  background:
    radial-gradient(ellipse 100% 90% at 26% 16%, rgba(150,104,6,0.10), transparent 58%),
    radial-gradient(ellipse 85% 100% at 80% 80%, rgba(110,70,0,0.08), transparent 60%);
  filter: blur(90px);
  animation: drift 26s ease-in-out infinite;
}
@keyframes drift {
  0%   { transform: translate3d(-4%,-3%,0) scale(1.05); }
  50%  { transform: translate3d(3%,4%,0)  scale(1.12); }
  100% { transform: translate3d(-4%,-3%,0) scale(1.05); }
}
.bg-vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0) 10%, rgba(0,0,0,0.55) 55%, rgba(0,0,0,0.92) 100%);
}

/* ── GRADIENT RING FRAMES (v4 signature) ── */
.ring { position: relative; }
.ring::before {
  content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px;
  background: linear-gradient(180deg,
    rgba(255,255,255,0.38) 0%, rgba(255,255,255,0.13) 20%,
    rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
    rgba(255,255,255,0.11) 80%, rgba(255,255,255,0.32) 100%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
          mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
          mask-composite: exclude;
  pointer-events: none; z-index: 3;
}
.ring-cap::before {
  background: linear-gradient(180deg,
    rgba(237,201,79,0.5) 0%, rgba(255,255,255,0.15) 20%,
    rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
    rgba(255,255,255,0.12) 80%, rgba(237,201,79,0.45) 100%);
}
.ring-sb::before {
  background: linear-gradient(180deg,
    rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.12) 20%,
    rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
    rgba(255,255,255,0.1) 80%, rgba(237,201,79,0.35) 100%);
}
.ring-gold::before {
  background: linear-gradient(180deg,
    rgba(237,201,79,0.55) 0%, rgba(237,201,79,0.18) 20%,
    rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
    rgba(237,201,79,0.15) 80%, rgba(237,201,79,0.5) 100%);
}
.glass {
  background: var(--glass);
  -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
}

/* ── NAVBAR (floating capsule) ── */
.prp-header {
  position: sticky; top: 0; z-index: 100;
  padding: 18px clamp(16px, 3vw, 28px) 10px;
  background: linear-gradient(180deg, rgba(3,3,4,0.92) 45%, rgba(3,3,4,0));
}
.prp-capsule {
  border-radius: 999px; overflow: hidden;
  background: rgba(12,10,6,0.5);
  -webkit-backdrop-filter: blur(18px) saturate(160%); backdrop-filter: blur(18px) saturate(160%);
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.1), 0 18px 50px -30px rgba(0,0,0,0.9);
  display: flex; align-items: center; justify-content: space-between; gap: 14px;
  padding: 11px 26px;
}
.prp-logo { display: flex; align-items: center; gap: 22px; min-width: 0; }
.prp-abinbev-logo { height: 28px; display: flex; align-items: center; flex-shrink: 0; }
.prp-abinbev-logo img { height: 28px; width: auto; object-fit: contain; }
.prp-logo-sep { width: 1px; height: 26px; background: rgba(255,240,200,0.15); flex: none; }
.prp-brand { min-width: 0; }
.prp-brand-name {
  font-size: 15.5px; font-weight: 600; color: var(--tx-hi); letter-spacing: -0.015em;
  line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.prp-brand-sub {
  font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.26em;
  color: rgba(237,201,79,0.75); text-transform: uppercase; margin-top: 2px; white-space: nowrap;
}

/* ── BRAND BUTTON (hamburger toggle for the report drawer) ── */
.prp-brand-btn {
  all: unset; display: flex; align-items: center; gap: 14px; min-width: 0;
  cursor: pointer; padding: 5px 14px 5px 6px; border-radius: 999px;
  transition: background .25s ease;
}
.prp-brand-btn:hover { background: rgba(255,255,255,0.05); }
.prp-brand-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
.hamburger {
  display: flex; flex-direction: column; justify-content: center; gap: 4px;
  width: 20px; height: 16px; flex: none;
}
.hamburger i {
  display: block; height: 2px; border-radius: 2px; background: var(--gold);
  transition: transform .3s cubic-bezier(.32,.72,0,1), opacity .2s ease, width .3s ease;
}
.hamburger i:nth-child(1) { width: 20px; }
.hamburger i:nth-child(2) { width: 14px; margin-left: auto; }
.hamburger i:nth-child(3) { width: 20px; }
.prp-brand-btn.open .hamburger i:nth-child(1) { width: 20px; transform: translateY(6px) rotate(45deg); }
.prp-brand-btn.open .hamburger i:nth-child(2) { opacity: 0; }
.prp-brand-btn.open .hamburger i:nth-child(3) { width: 20px; transform: translateY(-6px) rotate(-45deg); }
.prp-header-right { display: flex; align-items: center; gap: 9px; flex: none; }
.prp-badge {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 7px 15px; border-radius: 999px;
  background: rgba(255,255,255,0.04);
  -webkit-backdrop-filter: blur(16px) saturate(180%); backdrop-filter: blur(16px) saturate(180%);
  font-size: 12px; font-weight: 450; color: var(--tx-body);
  white-space: nowrap; font-variant-numeric: tabular-nums;
}
.prp-badge strong { color: var(--gold); font-weight: 650; }
.prp-badge-py { color: var(--tx-mute); }
.prp-badge-py::before {
  content: ''; width: 7px; height: 7px; border-radius: 999px;
  background: rgba(255,255,255,0.25); flex: none;
  transition: background .3s, box-shadow .3s;
}
.prp-badge-py.ready { color: #B8D8A2; }
.prp-badge-py.ready::before { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulseDot 2.4s ease-in-out infinite; }
@keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
@media (max-width: 720px) { .prp-badge-hide { display: none; } }
@media (max-width: 460px) { .prp-brand-sub, .prp-logo-sep { display: none; } }

/* ── SHELL (full viewport width — no sidebar column, the report list now
   lives in the hamburger drawer below the header) ── */
.shell {
  padding: 6px clamp(16px, 3vw, 28px) 52px;
}

/* ── NAV DRAWER (hamburger dropdown, full header width) ── */
.nav-drawer {
  max-width: 1400px; margin: 0 auto;
  max-height: 0; opacity: 0; margin-top: 0;
  overflow: hidden; pointer-events: none;
  padding: 0 clamp(16px, 3vw, 28px);
  transition: max-height .38s cubic-bezier(.32,.72,0,1), opacity .28s ease, margin-top .32s ease;
}
.nav-drawer.open {
  max-height: 640px; opacity: 1; margin-top: 12px; pointer-events: auto;
}
.nav-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 8px;
  border-radius: 24px; padding: 14px;
  background: rgba(12,10,6,0.6);
  -webkit-backdrop-filter: blur(18px) saturate(160%); backdrop-filter: blur(18px) saturate(160%);
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.1), 0 18px 50px -30px rgba(0,0,0,0.9);
}
.nav-item {
  display: flex; align-items: center; gap: 13px;
  padding: 11px 14px; border-radius: 14px; cursor: pointer;
  color: var(--tx-mute);
  transition: background .25s ease, color .25s ease;
}
.nav-item:hover:not(.active) { background: rgba(255,255,255,0.05); color: var(--tx-hi); }
.nav-item.active {
  color: var(--tx-hi);
  background: linear-gradient(90deg, rgba(237,201,79,0.18), rgba(237,201,79,0.04));
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.12), 0 0 24px rgba(237,201,79,0.10);
}
.nav-num {
  width: 26px; height: 26px; border-radius: 999px; flex: none;
  border: 1px solid rgba(237,201,79,0.35); color: rgba(237,201,79,0.8);
  font-family: var(--mono); font-size: 11px;
  display: grid; place-items: center;
  transition: background .25s, color .25s, border-color .25s, box-shadow .25s;
}
.nav-item.active .nav-num {
  background: linear-gradient(180deg, var(--gold-hi), var(--gold-mid));
  border-color: transparent; color: var(--gold-ink); font-weight: 700;
  box-shadow: 0 2px 10px rgba(237,201,79,0.4);
}
.nav-text {
  font-size: 13.5px; line-height: 1.3; min-width: 0;
}
.nav-item.active .nav-text { font-weight: 600; }
.nav-glow {
  margin-left: auto; width: 6px; height: 6px; border-radius: 999px; flex: none;
  background: var(--gold); box-shadow: 0 0 8px var(--gold); display: none;
}
.nav-item.active .nav-glow { display: block; }
@media (max-width: 640px) { .nav-grid { grid-template-columns: 1fr; } }

/* ── PIPELINE ROW ── */
.pipeline {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(min(300px, 100%), 1fr));
  gap: 16px; align-items: stretch; margin-bottom: 18px;
}
.pipe-card {
  border-radius: 20px; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 11px; min-width: 0;
}
.pipe-run {
  background: rgba(237,201,79,0.03);
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.12), 0 0 40px rgba(237,201,79,0.06);
}
.pipe-head { display: flex; align-items: center; gap: 10px; }
.pipe-num {
  width: 22px; height: 22px; border-radius: 999px; flex: none;
  background: rgba(237,201,79,0.12); border: 1px solid rgba(237,201,79,0.4);
  color: var(--gold); font-family: var(--mono); font-size: 11px;
  display: grid; place-items: center;
}
.pipe-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.26em;
  color: var(--cream-dim); text-transform: uppercase;
}

/* ── UPLOAD ZONE ── */
.upload-zone {
  position: relative; border: 1.5px dashed rgba(237,201,79,0.4); border-radius: 14px;
  padding: 12px; text-align: center; cursor: pointer;
  background: rgba(237,201,79,0.03);
  transition: border-color .3s, background .3s, box-shadow .3s;
  flex: 1; display: flex; align-items: center; justify-content: center; min-height: 52px;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: rgba(237,201,79,0.7); background: rgba(237,201,79,0.08);
}
.upload-zone.drag-over { border-style: solid; box-shadow: inset 0 0 30px rgba(237,201,79,0.07); }
.upload-zone input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.upload-hint { font-size: 12px; color: var(--tx-faint); pointer-events: none; line-height: 1.5; }
.upload-hint b { color: var(--tx-hi); font-weight: 500; font-size: 13.5px; margin-right: 4px; }
.file-ready {
  position: relative; overflow: hidden;
  display: flex; align-items: center; gap: 11px; padding: 11px 14px;
  background: rgba(111,191,90,0.08); border-radius: 12px;
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.08);
  animation: slideInLeft .4s cubic-bezier(.32,.72,0,1) both;
}
.file-ready::after {
  content: ''; position: absolute; top: 0; bottom: 0; width: 60%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  animation: scanLine 1.1s cubic-bezier(.4,0,.6,1) .4s 1 both; pointer-events: none;
}
.file-ok { color: var(--green); font-size: 14px; flex: none; }
.file-name {
  font-size: 13px; font-weight: 500; color: var(--tx-hi); min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.file-size-sm {
  margin-left: auto; flex: none; font-family: var(--mono); font-size: 11px;
  color: rgba(184,216,162,0.7); font-variant-numeric: tabular-nums; white-space: nowrap;
}

/* ── VARIANT ── */
.variant-radio {
  display: flex; align-items: flex-start; gap: 13px;
  padding: 11px 15px; border-radius: 14px; cursor: pointer; margin-bottom: 8px;
  background: rgba(255,255,255,0.03);
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.06);
  transition: background .25s, box-shadow .25s;
}
.variant-radio:hover:not(.active) { background: rgba(237,201,79,0.04); }
.variant-radio.active {
  background: rgba(237,201,79,0.07);
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.1), 0 0 24px rgba(237,201,79,0.06);
}
.radio-dot {
  width: 17px; height: 17px; border-radius: 999px; flex: none; margin-top: 3px;
  border: 2px solid rgba(237,201,79,0.45);
  display: grid; place-items: center; transition: border-color .25s;
}
.variant-radio.active .radio-dot { border-color: var(--gold); }
.variant-radio.active .radio-dot::after {
  content: ''; width: 7px; height: 7px; border-radius: 999px;
  background: var(--gold); box-shadow: 0 0 6px var(--gold);
}
.variant-body { min-width: 0; }
.variant-title { font-family: var(--serif); font-size: 17px; font-weight: 400; color: var(--tx-hi); line-height: 1.3; letter-spacing: 0; }
.variant-notes { font-size: 12.5px; color: var(--tx-mute); line-height: 1.55; margin-top: 4px; }
.gold-file { color: rgba(237,201,79,0.85); }

/* ── RUN BUTTON ── */
.run-btn {
  position: relative; overflow: hidden; width: 100%;
  background: linear-gradient(180deg, var(--gold-hi), var(--gold-mid));
  color: var(--gold-ink); border: none; border-radius: 999px;
  font-family: var(--font); font-size: 14.5px; font-weight: 650; letter-spacing: 0;
  padding: 10px 0; text-align: center; cursor: pointer;
  box-shadow: 0 4px 24px rgba(237,201,79,0.35), inset 0 1px 1px rgba(255,255,255,0.5);
  transition: box-shadow .3s, transform .2s cubic-bezier(.32,.72,0,1), filter .2s;
}
.run-btn::after {
  content: ''; position: absolute; top: 0; left: -120%; width: 55%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); transform: skewX(-20deg);
}
.run-btn:hover:not(:disabled) { box-shadow: 0 6px 32px rgba(237,201,79,0.5), inset 0 1px 1px rgba(255,255,255,0.5); filter: brightness(1.03); }
.run-btn:hover:not(:disabled)::after { animation: sheen .9s cubic-bezier(.4,0,.2,1); }
.run-btn:active:not(:disabled) { transform: translateY(1px); }
.run-btn:disabled {
  background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.35);
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.06); cursor: not-allowed;
}
.run-btn:disabled::after { display: none; }
@keyframes sheen { to { left: 130%; } }
.run-hint { font-size: 12px; color: var(--tx-faint); text-align: center; padding: 4px 0; }

/* ── RUN OUTPUTS ── */
.run-outputs { display: none; }
.run-outputs.show { display: flex; flex-direction: column; gap: 9px; animation: fadeUp .4s cubic-bezier(.32,.72,0,1) both; }
.run-out-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.run-out-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em;
  color: var(--cream-dim); text-transform: uppercase;
}
.run-out-ok { font-size: 11.5px; color: var(--green-soft); white-space: nowrap; }
.dl-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; }
.dl-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 9px 12px; border-radius: 999px; min-width: 0;
  background: rgba(255,255,255,0.03);
  -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px);
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.08);
  color: var(--tx-hi); font-size: 12.5px; font-weight: 500;
  text-decoration: none; cursor: pointer;
  transition: background .3s, box-shadow .3s;
}
.dl-btn:hover { background: rgba(237,201,79,0.08); }
.dl-btn svg { color: var(--gold); }
.dl-btn span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.run-out-foot { display: flex; align-items: center; justify-content: center; gap: 12px; }
.copy-link {
  all: unset;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;
  padding: 9px 16px; border-radius: 999px; min-width: 0;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.09);
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--tx-mute);
  transition: background .3s, box-shadow .3s, color .3s;
}
.copy-link svg { color: var(--gold); flex: none; }
.copy-link:hover { background: rgba(237,201,79,0.08); color: var(--tx-hi); }
.copy-link:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
.copy-link.ok { color: var(--green-soft); }
.dotsep { width: 3px; height: 3px; border-radius: 999px; background: rgba(255,240,200,0.3); flex: none; }
.run-out-note { font-size: 10.5px; color: var(--cream-faint); white-space: nowrap; }

/* ── PYTHON CHART PREVIEW ── */
.py-charts-wrap { display: flex; flex-direction: column; gap: 16px; margin-bottom: 16px; }
.py-chart-img { max-width: 100%; height: auto; display: block; border-radius: 6px; }
.py-chart-note { padding: 32px; text-align: center; color: var(--tx-mute); font-size: 13px; }

/* ── PREVIEW HEADER ── */
.preview-bar { display: flex; align-items: center; gap: 14px; padding: 8px 4px 0; margin-bottom: 16px; }
.preview-title { font-family: var(--serif); font-style: italic; font-size: 22px; color: var(--tx-hi); letter-spacing: 0; flex: none; }
.preview-rule { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(237,201,79,0.4), rgba(255,255,255,0.06)); }
.preview-meta { font-family: var(--mono); font-size: 11px; color: var(--cream-faint); white-space: nowrap; }
@media (max-width: 560px) { .preview-meta { display: none; } }

/* ── SHEET PANELS (chart on top, full width; table stacked below) ── */
.sheet-stack {
  display: flex; flex-direction: column; gap: 16px; margin-bottom: 16px;
}
.sheet-solo { margin-bottom: 16px; }
.panel {
  border-radius: 20px; padding: 20px 22px 16px;
  display: flex; flex-direction: column; gap: 13px; min-width: 0;
}
.panel-head { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; min-width: 0; }
.panel-title { font-family: var(--serif); font-size: 20px; font-weight: 400; color: var(--tx-hi); letter-spacing: 0; line-height: 1.25; }
.panel-meta { font-family: var(--mono); font-size: 11px; color: var(--cream-faint); }
.chart-box { flex: 1; min-height: 280px; }
.chart-box-wide { min-height: 460px; }
@media (max-width: 720px) { .chart-box-wide { min-height: 340px; } }

/* ── TABLES ── */
.data-table-wrap {
  overflow: auto; max-height: 360px;
  border: 1px solid var(--hairline); border-radius: 12px;
}
.data-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.data-table thead { position: sticky; top: 0; z-index: 1; }
.data-table th {
  background: rgba(18,15,9,0.92);
  -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  letter-spacing: 0.14em; text-transform: uppercase; color: var(--cream-dim);
  padding: 10px 14px; text-align: left;
  border-bottom: 1px solid var(--hairline); white-space: nowrap;
}
.data-table td {
  padding: 9px 14px; color: rgba(255,255,255,0.85);
  border-bottom: 1px solid var(--hairline-2);
  white-space: nowrap; max-width: 240px; overflow: hidden; text-overflow: ellipsis;
  font-variant-numeric: tabular-nums;
}
.data-table tbody tr:hover td { background: rgba(237,201,79,0.05); }
.data-table tr:last-child td { border-bottom: none; }
.table-hint { font-size: 10.5px; color: var(--cream-faint); margin-top: 8px; }

/* ── LOG ── */
details.log-details { border-radius: 16px; margin-top: 6px; overflow: hidden; }
details.log-details summary {
  color: var(--tx-mute); font-size: 12px; font-weight: 550; letter-spacing: 0.01em;
  padding: 12px 18px; cursor: pointer; list-style: none; user-select: none;
  display: flex; align-items: center; gap: 9px; transition: color .25s;
}
details.log-details summary::-webkit-details-marker { display: none; }
details.log-details summary::before {
  content: '›'; font-family: var(--mono); font-size: 14px; color: rgba(237,201,79,0.6);
  transition: transform .2s ease; display: inline-block;
}
details.log-details[open] summary::before { transform: rotate(90deg); }
details.log-details summary:hover { color: var(--gold); }
details.log-details[open] summary { border-bottom: 1px solid var(--hairline-2); }
.log-content { padding: 14px 18px; }
.log-label {
  font-family: var(--mono); font-size: 9px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.12em; color: var(--cream-faint); margin: 10px 0 7px;
}
.log-code {
  background: rgba(0,0,0,0.5); border: 1px solid var(--hairline-2); border-radius: 12px;
  color: var(--tx-body); font-size: 11.5px; line-height: 1.75; font-family: var(--mono);
  padding: 13px 15px; overflow-x: auto; white-space: pre-wrap; word-break: break-all;
}

/* ── SPINNER + SKELETON ── */
.spinner-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 240px; gap: 16px; }
.spinner { width: 28px; height: 28px; border: 2px solid rgba(237,201,79,0.15); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner-text { color: var(--tx-mute); font-size: 12.5px; letter-spacing: 0.01em; text-align: center; }
.skeleton { margin-top: 8px; }
.skeleton-bar-block {
  height: 200px; border-radius: 16px; margin-bottom: 18px;
  background:
    linear-gradient(90deg, transparent 0%, rgba(237,201,79,0.06) 50%, transparent 100%),
    rgba(255,255,255,0.02);
  background-size: 220% 100%, auto; background-repeat: no-repeat;
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);
  animation: shimmer 1.5s ease-in-out infinite;
}
.skeleton-line {
  height: 12px; border-radius: 6px; margin-bottom: 11px;
  background:
    linear-gradient(90deg, transparent 0%, rgba(237,201,79,0.07) 50%, transparent 100%),
    rgba(255,255,255,0.035);
  background-size: 220% 100%, auto; background-repeat: no-repeat;
  animation: shimmer 1.5s ease-in-out infinite;
}
.skeleton-line.w-40 { width: 40%; } .skeleton-line.w-70 { width: 70%; }
.skeleton-line.w-90 { width: 90%; } .skeleton-line.w-55 { width: 55%; }
@keyframes shimmer { 0% { background-position: 120% 0, 0 0; } 100% { background-position: -120% 0, 0 0; } }

/* ── ALERT ── */
.alert-error {
  background: rgba(224,106,106,0.07); border-radius: 14px;
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.06), inset 0 0 0 1px rgba(224,106,106,0.24);
  color: var(--tx-body); padding: 15px 18px; font-size: 12.5px; margin-top: 16px; line-height: 1.6;
  display: flex; align-items: flex-start; gap: 11px;
}
.alert-error::before {
  content: '!'; flex-shrink: 0; width: 18px; height: 18px; border-radius: 50%;
  background: rgba(224,106,106,0.16); color: var(--red); font-weight: 700; font-size: 11px;
  display: flex; align-items: center; justify-content: center; font-family: var(--mono);
}

/* ── EMPTY STATE ── */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 400px; border-radius: 20px; padding: 52px 32px;
  position: relative; overflow: hidden;
}
.empty-state::after {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 50% 28%, rgba(237,201,79,0.07) 0%, transparent 60%);
  pointer-events: none;
}
.empty-state > * { position: relative; z-index: 1; }
.empty-state-icon {
  width: 56px; height: 56px; border-radius: 999px; margin-bottom: 20px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(237,201,79,0.1); border: 1px solid rgba(237,201,79,0.3); color: var(--gold);
  box-shadow: 0 12px 32px -12px rgba(237,201,79,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
}
.empty-state-icon svg { width: 25px; height: 25px; }
.empty-state-title { font-family: var(--serif); font-size: 22px; font-weight: 400; color: var(--tx-hi); letter-spacing: 0; margin-bottom: 8px; }
.empty-state-desc { font-size: 12.5px; color: var(--tx-mute); text-align: center; max-width: 320px; line-height: 1.7; margin-bottom: 26px; }
.empty-steps { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.empty-step {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 11px; font-weight: 500; color: var(--tx-body);
  background: rgba(255,255,255,0.04); border-radius: 999px; padding: 6px 14px 6px 7px;
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.08);
}
.empty-step span {
  width: 18px; height: 18px; border-radius: 999px;
  background: rgba(237,201,79,0.12); border: 1px solid rgba(237,201,79,0.4); color: var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 9.5px; font-weight: 700;
}

/* ── ANIMATIONS ── */
@keyframes slideInLeft { from { opacity: 0; transform: translateX(-14px); } to { opacity: 1; transform: translateX(0); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
@keyframes scanLine { 0% { left: -60%; } 100% { left: 110%; } }
.anim-fade-up { animation: fadeUp 0.5s cubic-bezier(0.32,0.72,0,1) both; }
.results-reveal { animation: fadeUp 0.52s cubic-bezier(0.32,0.72,0,1) both; }
.results-reveal > * { animation: fadeUp 0.5s cubic-bezier(0.32,0.72,0,1) both; }
.results-reveal > *:nth-child(1) { animation-delay: 0.02s; }
.results-reveal > *:nth-child(2) { animation-delay: 0.07s; }
.results-reveal > *:nth-child(3) { animation-delay: 0.12s; }
.results-reveal > *:nth-child(4) { animation-delay: 0.17s; }
.results-reveal > *:nth-child(5) { animation-delay: 0.22s; }
.results-reveal > *:nth-child(n+6) { animation-delay: 0.27s; }

hr, .output-divider { border: none; border-top: 1px solid var(--hairline-2); margin: 4px 0 22px; }
</style>

<script>
// ── Inlined: report-engine.js ─────────────────────────────────────────────
window.Reports = window.Reports || {};
window.ReportEngine = (function () {
  'use strict';
  var NAN_STRINGS = { 'nan': 1, 'none': 1, 'nat': 1, '': 1 };
  function readSheet(wb, sheetName) {
    // Pre-parsed in a Web Worker (big-file path): return the already-extracted
    // { headers, rows } directly — identical shape to the main-thread branch.
    if (wb && wb.__prpParsed) {
      var ps = wb.__prpParsed[sheetName];
      if (!ps) throw new Error('Sheet not found: ' + sheetName);
      return { headers: ps.headers, rows: ps.rows };
    }
    var ws = wb.Sheets[sheetName];
    if (!ws) throw new Error('Sheet not found: ' + sheetName);
    // Read the header row directly (O(cols)) instead of parsing the whole sheet
    // a second time just to grab row 1. Raw .v values — identical to the old
    // sheet_to_json({header:1})[0], but no full-sheet scan on big files.
    var headers = [];
    if (ws['!ref']) {
      var range = XLSX.utils.decode_range(ws['!ref']);
      for (var c = range.s.c; c <= range.e.c; c++) {
        var cell = ws[XLSX.utils.encode_cell({ r: range.s.r, c: c })];
        headers.push(cell ? cell.v : undefined);
      }
    }
    var rows = XLSX.utils.sheet_to_json(ws, { defval: null, raw: true });
    return { headers: headers, rows: rows };
  }
  function isBlank(v) {
    if (v === null || v === undefined) return true;
    if (typeof v === 'number') return Number.isNaN(v);
    return NAN_STRINGS.hasOwnProperty(String(v).trim().toLowerCase());
  }
  function excelDateInfo(v) {
    if (isBlank(v)) return null;
    if (typeof v === 'number') {
      var d = XLSX.SSF.parse_date_code(v);
      if (!d) return null;
      return { year: d.y, month: d.m, day: d.d, hour: d.H || 0, minute: d.M || 0, second: Math.floor(d.S || 0) };
    }
    if (v instanceof Date) {
      return { year: v.getUTCFullYear(), month: v.getUTCMonth() + 1, day: v.getUTCDate(), hour: v.getUTCHours(), minute: v.getUTCMinutes(), second: v.getUTCSeconds() };
    }
    var s = String(v).trim();
    var m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (m) return { year: +m[1], month: +m[2], day: +m[3], hour: 0, minute: 0, second: 0 };
    var parsed = new Date(s);
    if (!isNaN(parsed.getTime())) {
      return { year: parsed.getUTCFullYear(), month: parsed.getUTCMonth() + 1, day: parsed.getUTCDate(), hour: parsed.getUTCHours(), minute: parsed.getUTCMinutes(), second: parsed.getUTCSeconds() };
    }
    return null;
  }
  function excelYear(v) { var info = excelDateInfo(v); return info ? info.year : null; }
  function isNumericColumn(rows, colIdx) {
    var sawNumber = false;
    for (var i = 0; i < rows.length; i++) {
      var v = rows[i][colIdx];
      if (isBlank(v)) continue;
      if (typeof v !== 'number') return false;
      sawNumber = true;
    }
    return sawNumber;
  }
  function padGrid(grid) {
    var width = grid.reduce(function (w, row) { return Math.max(w, row ? row.length : 0); }, 0);
    return grid.map(function (row) {
      row = row || [];
      var padded = row.slice();
      while (padded.length < width) padded.push(null);
      return padded;
    });
  }
  function sheetFromGrid(grid) {
    var padded = padGrid(grid);
    var headers = (padded[0] || []).map(function (h) {
      return (h === null || h === undefined || String(h).trim() === '') ? '' : String(h);
    });
    return { headers: headers, rows: padded.slice(1) };
  }
  function trimSparseRows(sheet) {
    if (!sheet.rows.length) return sheet;
    var threshold = Math.max(2, Math.floor(sheet.headers.length / 2));
    var kept = sheet.rows.filter(function (row) {
      var filled = 0;
      for (var i = 0; i < row.length; i++) if (!isBlank(row[i])) filled++;
      return filled >= threshold;
    });
    return { headers: sheet.headers, rows: kept };
  }
  function trimSparseCols(sheet) {
    if (!sheet.rows.length) return sheet;
    var threshold = Math.max(2, Math.floor(sheet.rows.length / 2));
    var keepIdx = [];
    for (var c = 0; c < sheet.headers.length; c++) {
      var filled = 0;
      for (var r = 0; r < sheet.rows.length; r++) if (!isBlank(sheet.rows[r][c])) filled++;
      if (filled >= threshold) keepIdx.push(c);
    }
    return {
      headers: keepIdx.map(function (i) { return sheet.headers[i]; }),
      rows: sheet.rows.map(function (row) { return keepIdx.map(function (i) { return row[i]; }); }),
    };
  }
  function trimSparse(sheet) { return trimSparseCols(trimSparseRows(sheet)); }
  function safeVal(v) {
    if (v === null || v === undefined) return '';
    if (typeof v === 'boolean') return v;
    if (typeof v === 'number') {
      if (Number.isNaN(v) || !Number.isFinite(v)) return '';
      if (Number.isInteger(v) && Math.abs(v) < 1e15) return v;
      return Math.round(v * 1e6) / 1e6;
    }
    var s = String(v);
    return NAN_STRINGS.hasOwnProperty(s.trim().toLowerCase()) ? '' : s;
  }
  function previewRows(sheet, limit) {
    var rows = limit ? sheet.rows.slice(0, limit) : sheet.rows;
    return rows.map(function (row) { return row.map(safeVal); });
  }
  function toTsv(sheet, limit) {
    var headers = sheet.headers;
    var rows = limit ? sheet.rows.slice(0, limit) : sheet.rows;
    var numericCol = headers.map(function (_, i) { return isNumericColumn(sheet.rows, i); });
    var lines = [headers.join('\t')];
    rows.forEach(function (row) {
      var cells = row.map(function (v, i) {
        if (isBlank(v)) return '';
        if (numericCol[i]) { if (typeof v === 'number' && Number.isInteger(v)) return String(v); return String(v); }
        return String(v).replace(/[\t\r\n]+/g, ' ').trim();
      });
      lines.push(cells.join('\t'));
    });
    return lines.join('\n') + '\n';
  }
  function chartableFromSheet(sheet) {
    if (!sheet || !sheet.rows.length) return null;
    var headers = sheet.headers;
    var numericIdx = [], labelIdx = [];
    headers.forEach(function (h, i) { (isNumericColumn(sheet.rows, i) ? numericIdx : labelIdx).push(i); });
    if (!numericIdx.length || !labelIdx.length) return null;
    var labelI = labelIdx[0];
    var rows = sheet.rows.filter(function (row) {
      if (isBlank(row[labelI])) return false;
      var s = String(row[labelI]).trim().toLowerCase();
      return s !== 'grand total' && s !== 'total';
    });
    if (!rows.length) return null;
    var labels = rows.map(function (row) { return String(row[labelI]); });
    var series = numericIdx.map(function (i, idx) {
      var name = String(headers[i]).replace(/:/g, '_').replace(/\./g, '_');
      if (!name) name = 'col_' + idx;
      return { name: name, values: rows.map(function (row) { var v = row[i]; return (typeof v === 'number' && !Number.isNaN(v)) ? v : 0; }) };
    });
    return { type: 'bar', labels: labels, series: series };
  }
  function d2ChartFromGrid(grid) {
    var kpiRowIdx = -1;
    for (var i = 0; i < grid.length; i++) {

// ---------------------------------------------------------------------------
// Escape helpers
// ---------------------------------------------------------------------------
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
}

// ---------------------------------------------------------------------------
// Nav
// ---------------------------------------------------------------------------
function renderNav() {
  const panel = document.getElementById('nav-panel');
  let html = '';
  GROUP_NAMES.forEach(function(gname, idx) {
    const isActive = S.activeGroup === gname;
    const short = SHORT_LABELS[gname] || gname;
    html += '<div class="nav-item' + (isActive ? ' active' : '') +
            '" data-group="' + escAttr(gname) + '" title="' + escAttr(gname) + '">' +
            '<span class="nav-num">' + (idx + 1) + '</span>' +
            '<span class="nav-text">' + esc(short) + '</span>' +
            '<span class="nav-glow"></span>' +
            '</div>';
  });
  panel.innerHTML = html;
  panel.querySelectorAll('.nav-item').forEach(function(el) {
    el.addEventListener('click', function() {
      const gname = el.dataset.group;
      if (window.closeNavDrawer) window.closeNavDrawer();
      if (gname === S.activeGroup) return;
      S.activeGroup = gname;
      S.variantIdx = 0;
      S.result = null;
      renderNav();
      renderVariants();
      renderResults();
      updateRunBtn();
    });
  });
}

// ---------------------------------------------------------------------------
// Nav drawer (hamburger toggle on the "PRP Automation Dashboard" title)
// ---------------------------------------------------------------------------
function setupNavToggle() {
  const btn = document.getElementById('nav-toggle');
  const drawer = document.getElementById('nav-drawer');
  function close() {
    drawer.classList.remove('open');
    btn.classList.remove('open');
    btn.setAttribute('aria-expanded', 'false');
  }
  function open() {
    drawer.classList.add('open');
    btn.classList.add('open');
    btn.setAttribute('aria-expanded', 'true');
  }
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    if (drawer.classList.contains('open')) close(); else open();
  });
  document.addEventListener('click', function(e) {
    if (!drawer.classList.contains('open')) return;
    if (drawer.contains(e.target) || btn.contains(e.target)) return;
    close();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') close();
  });
  window.closeNavDrawer = close;
}

// Variants

function goldFiles(escapedText) {
  // highlight output workbook names in gold (runs on already-escaped text)
  return escapedText.replace(/([A-Za-z0-9_.()\- ]+?\.xlsx)/g, '<span class="gold-file">$1</span>');
}

function renderVariants() {
  const g = GROUPS[S.activeGroup];
  const container = document.getElementById('variant-radios');
  let html = '';
  g.forEach(function(e, i) {
    const isActive = i === S.variantIdx;
    html += '<div class="variant-radio' + (isActive ? ' active' : '') + '" data-idx="' + i + '">' +
            '<span class="radio-dot"></span>' +
            '<div class="variant-body">' +
            '<div class="variant-title">' + esc(e.label) + '</div>' +
            (isActive ? '<div class="variant-notes">' + goldFiles(esc(e.notes)) + '</div>' : '') +
            '</div></div>';

  container.innerHTML = html;
  container.querySelectorAll('.variant-radio').forEach(function(el) {
    el.addEventListener('click', function() {
      const idx = parseInt(el.dataset.idx, 10);

      S.variantIdx = idx;
      renderVariants();
    });
  });

function handleFileChange(file) {
  if (!file || !file.name.toLowerCase().endsWith('.xlsx')) return;
  S.file = file;
  const kb = (file.size / 1024).toFixed(1);
  document.getElementById('file-ready-info').innerHTML =
    '<div class="file-ready">' +
    '<span class="file-ok">&#10003;</span>' +
    '<span class="file-name">' + esc(file.name) + '</span>' +
    '<span class="file-size-sm">' + kb + ' KB</span>' +
    '</div>';
  updateRunBtn();
}

function updateRunBtn() {
  const btn = document.getElementById('run-btn');
  const hint = document.getElementById('run-hint');
  btn.disabled = !S.file || S.running;
  btn.textContent = S.running ? 'Running…' : 'Run report';
  if (!S.file) {
    hint.textContent = 'Upload a workbook to enable';
    hint.style.display = 'block';
  } else if (S.running) {
    hint.textContent = 'Generating report…';
    hint.style.display = 'block';
  } else if (!S.result) {
    hint.textContent = 'Run to generate the report files';
    hint.style.display = 'block';
  } else {
    hint.style.display = 'none';
  }

async function handleRun() {
  if (!S.file || S.running) return;

  const entry = currentEntry();
  S.running = true;
  updateRunBtn();
  _runLoadingUi(entry.label);

  const ra = document.getElementById('results-area');

  if (typeof XLSX === 'undefined' || typeof ExcelJS === 'undefined' || typeof Plotly === 'undefined') {
    ra.innerHTML = '<div class="alert-error">' +
      '<strong>Vendor libraries not loaded.</strong><br>' +
      'Make sure the <code>vendor/</code> folder is present next to <code>index.html</code>, or check your internet connection for CDN fallback.' +
      '</div>';
    S.running = false;
    updateRunBtn();
    return;
  }

  try {
    const data = await ReportBridge.runReport(entry, S.file);
    S.result = data;
    renderResults();
  } catch (err) {
    console.error(err);
    ra.innerHTML = '<div class="alert-error">Error while running: ' + esc(String(err)) + '</div>';

    S.running = false;
    updateRunBtn();

    if (ro) { ro.innerHTML = ''; ro.classList.remove('show'); }
    ra.innerHTML =
      '<div class="empty-state anim-fade-up">' +
      '<div class="empty-state-icon">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
      '<path d="M4 19.5V5a1 1 0 0 1 1-1h9.5L20 9.5V19.5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1Z"/>' +
      '<path d="M14 4v5.5h5.5"/><path d="M8.5 14.5v2.5"/><path d="M12 12v5"/><path d="M15.5 15v2"/>' +
      '</svg></div>' +
      '<div class="empty-state-title">Your report will appear here</div>' +
      '<div class="empty-state-desc">Choose a report, drop in your workbook, then generate. ' +
      'Downloads appear with the Run button; tables and charts render below.</div>' +
      '<div class="empty-steps">' +
      '<div class="empty-step"><span>1</span>Select report</div>' +
      '<div class="empty-step"><span>2</span>Upload workbook</div>' +
      '<div class="empty-step"><span>3</span>Run</div>' +
      '</div>' +
      '</div>';
    return;
  }

  const d = S.result;

  // ── Downloads + Copy: rendered inside the Generate card ──
  if (ro) {
    let ohtml = '<div class="run-out-top">' +
                '<span class="run-out-label">Download &middot; ' + d.files.length + ' file' + (d.files.length !== 1 ? 's' : '') + '</span>' +
                '<span class="run-out-ok">&#9679; complete</span>' +
                '</div>';
    ohtml += '<div class="dl-grid" id="dl-buttons">';
    if (d.copy_tsv) {
      ohtml += '<button class="copy-link" id="copy-btn">' + ICON_COPY + 'Copy text</button>';
    }
    ohtml += '</div>';
    ro.innerHTML = ohtml;
    ro.classList.add('show');
  }

  let html = '<div class="results-reveal">';

  // Process preview header
  html += '<div class="preview-bar">' +
          '<span class="preview-title">Process preview</span>' +
          '<span class="preview-rule"></span>' +
          '</div>';

  d.sheets.forEach(function(sheet, si) {
    const tablePanel =
      '<div class="panel glass ring">' +
      '<div class="panel-head"><span class="panel-title">' + esc(sheet.name) + '</span></div>' +
      tableHtml(sheet.headers, sheet.preview, sheet.rows) +
      '</div>';
    if (sheet.chart) {
      html += '<div class="sheet-stack">' +
              '<div class="panel glass ring">' +
              '<div class="panel-head"><span class="panel-title">Chart preview</span></div>' +
              '<div class="chart-box chart-box-wide" id="chart-' + si + '"></div>' +
              '</div>' +
              tablePanel +
              '</div>';
    } else {
      html += '<div class="sheet-solo">' + tablePanel + '</div>';
    }
  });

  // Log
  html += '<details class="log-details glass ring"' + (d.ok ? '' : ' open') + '>' +
          '<summary>Script log &nbsp;&middot;&nbsp; stdout / stderr</summary>' +
          '<div class="log-content">';
  if (d.stdout && d.stdout.trim()) {
    html += '<pre class="log-code">' + esc(d.stdout) + '</pre>';
  }
  if (d.stderr && d.stderr.trim()) {
    html += '<div class="log-label">stderr</div><pre class="log-code">' + esc(d.stderr) + '</pre>';
  }
  if (!(d.stdout && d.stdout.trim()) && !(d.stderr && d.stderr.trim())) {
    html += '<div style="color:var(--tx-mute);font-size:12px;padding:4px 0;">No console output.</div>';
  }
  html += '</div></details>';
  html += '</div>'; // results-reveal

  ra.innerHTML = html;

  // Wire download buttons (blob URLs from base64)
  const dlWrap = document.getElementById('dl-buttons');
  if (dlWrap) d.files.forEach(function(f) {
    const bytes = b64ToBytes(f.data_b64);
    const blob = new Blob([bytes], { type: f.mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.className = 'dl-btn';
    a.href = url;
    a.download = f.name;
    a.innerHTML = ICON_DL + '<span>' + esc(f.name) + '</span>';
    dlWrap.appendChild(a);
  });

  // Copy button
  const copyBtn = document.getElementById('copy-btn');
  if (copyBtn && d.copy_tsv) {
    copyBtn.addEventListener('click', function() {
      const text = d.copy_tsv;
      const flash = function(ok) {
        copyBtn.innerHTML = ok ? (ICON_OK + 'Copied') : (ICON_COPY + 'Copy failed');
        copyBtn.classList.toggle('ok', ok);
        setTimeout(function() { copyBtn.innerHTML = ICON_COPY + 'Copy text'; copyBtn.classList.remove('ok'); }, 2000);
      };
      // execCommand fallback — works on file:// and non-secure origins where
      // navigator.clipboard rejects. Runs both when the modern API is absent
      // AND when writeText() rejects (the case that silently failed before).
      const legacy = function() {
        try {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;';
          document.body.appendChild(ta);
          ta.focus(); ta.select();
          try { ta.setSelectionRange(0, text.length); } catch (e) {}
          const ok = document.execCommand('copy');
          document.body.removeChild(ta);
          flash(ok);
        } catch (e) { flash(false); }
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() { flash(true); }, legacy);
      } else {
        legacy();
      }
    });
  }

  // Render Plotly charts for browser preview
  d.sheets.forEach(function(sheet, si) {
    if (!sheet.chart) return;
    const el = document.getElementById('chart-' + si);
    if (!el) return;
    const cfg = sheet.chart.type === 'hbar'
      ? buildHBar(sheet.chart, 'Improve in Supplier Response Time')
      : buildBar(sheet.chart, null);
    Plotly.newPlot(el, cfg.traces, cfg.layout, { displayModeBar: false, responsive: true });
  });
}

// ---------------------------------------------------------------------------
// Table HTML
// ---------------------------------------------------------------------------
function tableHtml(headers, rows, totalRows) {
  let h = '<div class="data-table-wrap"><table class="data-table"><thead><tr>';
  headers.forEach(function(hdr) { h += '<th>' + esc(hdr || '') + '</th>'; });
  h += '</tr></thead><tbody>';
  rows.forEach(function(row) {
    h += '<tr>';
    row.forEach(function(v) {
      const s = v === null || v === undefined ? '' : String(v);
      h += '<td title="' + escAttr(s) + '">' + esc(s) + '</td>';
    });
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  if (totalRows > 50) {
    h += '<div class="table-hint">Showing 50 of ' + totalRows + ' rows — download .xlsx for full dataset.</div>';
  }
  return h;
}

// ---------------------------------------------------------------------------
// Charts
// ---------------------------------------------------------------------------
const _CHART_FONT = "Arial, 'Helvetica Neue', Helvetica, sans-serif";
const _GOLD = ["#CBB35C","#4CAE5F","#C96A72","#5B83C2","#A86FC0","#DCA03C"];
const _FILL = ["rgba(203,179,92,0.88)","rgba(76,174,95,0.8)","rgba(201,106,114,0.8)","rgba(91,131,194,0.8)","rgba(168,111,192,0.8)","rgba(220,160,60,0.8)"];

function _baseLayout(title) {
  const tc = "#B3A67E", gc = "rgba(255,255,255,0.06)";
  const font = { family:_CHART_FONT, color:tc, size:11 };
  return {
    title: title ? { text:title, font:{ family:_CHART_FONT, color:"#D8CBA0", size:11.5 }, x:0, xanchor:"left", pad:{ l:4, b:12 } } : undefined,
    paper_bgcolor:"rgba(0,0,0,0)", plot_bgcolor:"rgba(0,0,0,0)", font,
    margin:{ l:48, r:20, t:title ? 40 : 20, b:60 },
    legend:{ orientation:"h", yanchor:"bottom", y:1.02, xanchor:"right", x:1, font:{ family:_CHART_FONT, color:"#CFC4A0", size:10.5 }, bgcolor:"rgba(0,0,0,0)", bordercolor:"rgba(0,0,0,0)" },
    xaxis:{ gridcolor:gc, linecolor:"rgba(237,201,79,0.22)", tickcolor:"rgba(237,201,79,0.22)", tickfont:{ family:_CHART_FONT, color:tc, size:10 }, tickangle:-25 },
    yaxis:{ gridcolor:gc, linecolor:"rgba(237,201,79,0.22)", tickcolor:"rgba(237,201,79,0.22)", tickfont:{ family:_CHART_FONT, color:tc, size:10 }, zeroline:false },
    hoverlabel:{ bgcolor:"#14110a", bordercolor:"rgba(237,201,79,0.25)", font:{ family:_CHART_FONT, color:"#F4ECD4", size:12 } },
  };
}

function buildBar(chartData, title) {
  const traces = chartData.series.map(function(s, i) {
    return {
      type:"bar", name:s.name, x:chartData.labels, y:s.values,
      marker:{ color:_FILL[i % _FILL.length], line:{ color:_GOLD[i % _GOLD.length], width:0 } },
      hovertemplate:"<b>%{x}</b><br>" + esc(s.name) + ": <b>%{y:,.0f}</b><extra></extra>",
    };
  });
  const layout = Object.assign(_baseLayout(title), { barmode:"group", bargap:0.22, bargroupgap:0.06 });
  return { traces, layout };
}

function buildHBar(chartData, title) {
  const tc = "#B3A67E", gc = "rgba(255,255,255,0.06)";
  const font = { family:_CHART_FONT, color:tc, size:10 };
  const vals = chartData.series[0].values;
  const maxVal = Math.max.apply(null, vals.concat([0]));
  const traces = [{
    type:"bar", orientation:"h", name:"",
    x:vals, y:chartData.labels,
    marker:{ color:"rgba(237,201,79,0.82)" },
    text:vals.map(function(v) { return (v * 100).toFixed(0) + "%"; }),
    textposition:"outside",
    textfont:{ color:"#E8DDBB", size:10, family:_CHART_FONT },
    hovertemplate:"<b>%{y}</b>: <b>%{x:.0%}</b><extra></extra>",
  }];
  const layout = {
    title: title ? { text:title, font:{ family:_CHART_FONT, color:"#D8CBA0", size:11.5 }, x:0, xanchor:"left", pad:{ l:4, b:12 } } : undefined,
    paper_bgcolor:"rgba(0,0,0,0)", plot_bgcolor:"rgba(0,0,0,0)", font,
    margin:{ l:130, r:70, t:40, b:40 },
    xaxis:{ gridcolor:gc, linecolor:"rgba(237,201,79,0.22)", tickformat:".0%", tickfont:font, zeroline:false, range:[0, maxVal * 1.3] },
    yaxis:{ gridcolor:gc, linecolor:"rgba(237,201,79,0.22)", tickfont:font },
    hoverlabel:{ bgcolor:"#14110a", bordercolor:"rgba(237,201,79,0.25)", font:{ family:_CHART_FONT, color:"#F4ECD4", size:12 } },
    showlegend:false,
  };
  return { traces, layout };
}

// ---------------------------------------------------------------------------
// Utility
// ---------------------------------------------------------------------------
function b64ToBytes(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
async function init() {
  setupNavToggle();
  renderNav();
  renderVariants();
  renderResults();

  // File input
  document.getElementById('file-input').addEventListener('change', function(e) {
    if (e.target.files.length) handleFileChange(e.target.files[0]);
  });

  // Drag and drop on upload zone
  const uz = document.getElementById('upload-zone');
  uz.addEventListener('dragover', function(e) { e.preventDefault(); uz.classList.add('drag-over'); });
  uz.addEventListener('dragleave', function() { uz.classList.remove('drag-over'); });
  uz.addEventListener('drop', function(e) {
    e.preventDefault();
    uz.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) handleFileChange(f);
  });

  document.getElementById('run-btn').addEventListener('click', handleRun);

  updateRunBtn();
}

window._PRPReady(
  function () {
    var overlay = document.getElementById('prp-load-overlay');
    if (overlay) overlay.style.display = 'none';
    init();
  },
  function (err) {
    var spinner = document.getElementById('prp-load-spin');
    var errDiv = document.getElementById('prp-load-err');
    if (spinner) spinner.style.display = 'none';
    if (errDiv) {
      errDiv.style.display = 'block';
      errDiv.innerHTML = '<strong>Failed to load required libraries.</strong><br>' +
        'Extract the ZIP fully before opening, or check your internet connection for CDN fallback.<br>' +
        '<span style="opacity:0.6;">' + (err ? String(err) : '') + '</span>';
    }
  }
);

</script>
